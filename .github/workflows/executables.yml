name: Build and Attach Executables
on:
  push:
    tags:
      - "v*"
jobs:
  build-executables:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: bun-windows-x64
            outfile: jaft.exe
            archive: jaft-windows.zip
          - target: bun-darwin-arm64
            outfile: jaft
            archive: jaft-macos.zip
          - target: bun-linux-x64
            outfile: jaft
            archive: jaft-linux.zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install

      - name: Build SvelteKit app
        run: bun run build

      - name: Compile launcher
        run: bun build --compile --target=${{ matrix.target }} ./launcher.ts --outfile ${{ matrix.outfile }}

      - name: Package binary with build output
        run: zip -r ${{ matrix.archive }} ${{ matrix.outfile }} build/

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive }}
